#
# Definition of all trackable objects
# Identifier corresponds to Trackable ID set in Tracking Tools
#
mocap_node:
    ros__parameters:
        rigid_bodies:
            1:
                pose: "Crazyflie/pose"
                pose2d: "Crazyflie/ground_pose"
                odom: Crazyflie/Odom
                child_frame_id: "Crazyflie/base_link"
                parent_frame_id: "world"
            2:
                pose: "Platform/pose"
                pose2d: "Platform/ground_pose"
                odom: Platform/Odom
                child_frame_id: "Platform/base_link"
                parent_frame_id: "world"
        optitrack_config:
                multicast_address: "239.255.42.99"
                command_port: 1510
                data_port: 1511
                enable_optitrack: true
                version: [3,0,0,0]
